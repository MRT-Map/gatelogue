on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  
permissions:
  contents: write
  
jobs:
  build-client:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: latest
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: latest
      - run: |
          cd gatelogue-client
          pnpm install --no-frozen-lockfile
          pnpm run build
      - run: |
          cd gatelogue-client/dist
          echo > .nojekyll
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: client
          path: gatelogue-client/dist

  build-docs-py:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pypa/hatch@install
      - run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends graphviz graphviz-dev
      - run: |
          cd gatelogue-aggregator
          hatch run docs:build
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: docs-py
          path: gatelogue-aggregator/docs/_build/html/

  build-docs-rs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions-rust-lang/setup-rust-toolchain@a0b538fa0b742a6aa35d6e2c169b4bd06d225a98 # v1.15.3
      - run: |
          cd gatelogue-types-rs
          cargo doc --no-deps
      - run: cp .github/docs-rs-redirect.html gatelogue-types-rs/target/doc/index.html
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: docs-rs
          path: gatelogue-types-rs/target/doc/

  build-docs-ts:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: latest
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: latest
      - run: |
          cd gatelogue-types-ts
          pnpm install --no-frozen-lockfile
          pnpm run doc
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: docs-ts
          path: gatelogue-types-ts/docs


  pages:
    runs-on: ubuntu-latest
    needs: [ build-client, build-docs-py, build-docs-rs, build-docs-ts ]

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: client
        path: dist
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: docs-py
        path: dist/docs
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: docs-rs
        path: dist/docs/rs
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: docs-ts
        path: dist/docs/ts
    - name: Deploy
      uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: dist
