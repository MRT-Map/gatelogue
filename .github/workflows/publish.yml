name: Publish
on:
  workflow_dispatch:

jobs:
  tests:
    permissions:
      contents: read
    uses: ./.github/workflows/tests.yml

  changelog-version:
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
      short_version: ${{ steps.version.outputs.version }}
      data_version: ${{ steps.version.outputs.data_version }}
      version: ${{ steps.version.outputs.version }}+${{ steps.version.outputs.data_version }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: version
        run: |
          cd gatelogue-aggregator/src
          python -c "
          from gatelogue_aggregator.__about__ import __version__, __data_version__
          print('version=v'+__version__)
          print('data_version='+str(__data_version__))
          " >> "$GITHUB_OUTPUT"

      - id: changelog
        run: |
           cd gatelogue-aggregator/src
           {
           echo 'changelog<<__EOF__'
           python -c "
           from gatelogue_aggregator.__about__ import __version__, __data_version__
           print('\n'.join(open('../../CHANGELOG.md').read().split('## v'+__version__+'+'+str(__data_version__))[1].split('\n')[1:]).split('\n##')[0])
           "
           echo __EOF__
           } >> "$GITHUB_OUTPUT"

  build-py:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gatelogue-types-py
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: pypa/hatch@install
      with:
        version: "1.16.5"
    - run: hatch build
    - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: dist-py
        path: gatelogue-types-py/dist

  build-rs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gatelogue-types-rs
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
      with:
        toolchain: nightly
        cache-workspaces: './gatelogue-types-rs -> target'
    - run: cargo package
    - run: cargo publish --dry-run
    - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: dist-rs
        path: gatelogue-types-rs/target/package/*.crate

  build-ts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gatelogue-types-ts
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: "10.32.1"
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 25.8.1
          cache: "pnpm"
          cache-dependency-path: "**/pnpm-lock.yaml"
          registry-url: https://registry.npmjs.org/
      - run: pnpm i
      - run: pnpm pack
      - run: pnpm publish --dry-run && pnpx jsr publish --dry-run
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dist-ts
          path: gatelogue-types-ts/gatelogue-types-*.tgz

  github-release:
    runs-on: ubuntu-latest
    needs: [ build-py, build-rs, build-ts, changelog-version, tests ]
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-py
          path: dist
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-rs
          path: dist
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-ts
          path: dist
      - uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ needs.changelog-version.outputs.version }}
          body: ${{ needs.changelog-version.outputs.changelog }}
          files: dist/*

  publish-pypi:
    runs-on: ubuntu-latest
    needs: [ build-py, tests ]
    environment:
      name: pypi
      url: https://pypi.org/p/gatelogue-types
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-py
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-crates-io:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gatelogue-types-rs
    permissions:
      id-token: write
    needs: [ build-rs, tests ]
    environment:
      name: crates
      url: https://crates.io/crates/gatelogue-types

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          toolchain: nightly
          cache-workspaces: './gatelogue-types-rs -> target'
      - uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: auth
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  publish-npm:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gatelogue-types-ts
    permissions:
      contents: read
      id-token: write
    needs: [ build-ts, tests ]
    environment:
      name: npm
      url: https://www.npmjs.com/package/gatelogue-types

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: "10.32.1"
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 25.8.1
          cache: "pnpm"
          cache-dependency-path: "**/pnpm-lock.yaml"
          registry-url: https://registry.npmjs.org/
      - run: npm install -g npm@latest
      - run: pnpm i
      - run: pnpm publish

  publish-gpr:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gatelogue-types-ts
    permissions:
      contents: read
      packages: write
    needs: [ build-ts, tests ]


    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: "10.32.1"
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 25.8.1
          cache: "pnpm"
          cache-dependency-path: "**/pnpm-lock.yaml"
          registry-url: https://npm.pkg.github.com/
      - run: |
          cat package.json | sed "s/\"name\": \"/\"name\": \"@mrt-map\//g" > package2.json
          mv package2.json package.json
      - run: pnpm i
      - run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{secrets.GITHUB_TOKEN}}

  publish-jsr:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gatelogue-types-ts
    permissions:
      contents: read
      id-token: write
    needs: [ build-ts, tests ]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: "10.32.1"
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 25.8.1
          cache: "pnpm"
          cache-dependency-path: "**/pnpm-lock.yaml"
      - run: mv ../README.md .
      - run: pnpm i
      - run: pnpx jsr publish

