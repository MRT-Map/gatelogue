name: Publish
on:
  workflow_dispatch:
  push:
    tags: ["**"]


env:
  # renovate: datasource=custom.rust.nightly depName=x86_64-unknown-linux-gnu versioning=rust-release-channel
  RUST_VERSION: nightly-2026-03-28

jobs:
  tests:
    permissions:
      contents: read
    uses: ./.github/workflows/tests.yml

  changelog-version:
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
      short_version: ${{ steps.version.outputs.version }}
      data_version: ${{ steps.version.outputs.data_version }}
      version: ${{ steps.version.outputs.version }}+${{ steps.version.outputs.data_version }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - id: version
        run: |
          if [ -z "$HAS_TAG" ]; then
            echo "version=$(echo "$TAG" | cut -d '+' -f1)" >> "$GITHUB_OUTPUT"
            echo "data_version=$(echo "$TAG" | cut -d '+' -f2)" >> "$GITHUB_OUTPUT"
          else
            cd gatelogue-aggregator/src
            python -c "
          from gatelogue_aggregator.__about__ import __version__, __data_version__
          print('version=v'+__version__)
          print('data_version='+str(__data_version__))
            " >> "$GITHUB_OUTPUT"
          fi
        env:
          HAS_TAG: ${{ github.ref_type == 'tag' }}
          TAG: ${{ github.ref_name }}

      - id: changelog
        run: |
           cd gatelogue-aggregator/src
           {
           echo 'changelog<<__EOF__'
           python -c "
           from gatelogue_aggregator.__about__ import __version__, __data_version__
           print('\n'.join(open('../../CHANGELOG.md').read().split('## v'+__version__+'+'+str(__data_version__))[1].split('\n')[1:]).split('\n##')[0])
           "
           echo __EOF__
           } >> "$GITHUB_OUTPUT"

  build-py:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gatelogue-types-py
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - uses: ./.github/actions/setup-python
      with:
        cache: false
    - run: hatch build
    - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: dist-py
        path: gatelogue-types-py/dist

  build-rs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gatelogue-types-rs
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - uses: ./.github/actions/setup-rust
      with:
        cache: false
    - run: cargo package --locked
    - run: cargo publish --locked --dry-run
    - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: dist-rs
        path: gatelogue-types-rs/target/package/*.crate

  build-ts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gatelogue-types-ts
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node
        with:
          cache: false
          registry-url: https://registry.npmjs.org/

      - run: pnpm i
      - run: pnpm pack
      - run: pnpm publish --no-git-checks --dry-run && pnpx jsr publish --dry-run
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dist-ts
          path: gatelogue-types-ts/gatelogue-types-*.tgz

  github-release:
    runs-on: ubuntu-latest
    needs: [ build-py, build-rs, build-ts, changelog-version, tests ]
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-py
          path: dist
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-rs
          path: dist
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-ts
          path: dist
      - uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: dist/*
      - uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ needs.changelog-version.outputs.version }}
          name: ${{ needs.changelog-version.outputs.version }}
          body: ${{ needs.changelog-version.outputs.changelog }}
          files: dist/*
          generate_release_notes: true

  delete-github-release:
    runs-on: ubuntu-latest
    needs: [ build-py, build-rs, build-ts, changelog-version, github-release, tests ]
    if: ${{ always() && contains(needs.*.result, 'failure') }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - run: gh release delete $TAG --cleanup-tag -y
        env:
          TAG: ${{ needs.changelog-version.outputs.version }}
          GH_TOKEN: ${{ github.token }}
        continue-on-error: true

  publish-pypi:
    runs-on: ubuntu-latest
    needs: [ build-py, github-release ]
    environment:
      name: pypi
      url: https://pypi.org/p/gatelogue-types
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-py
          path: dist
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

  publish-crates-io:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gatelogue-types-rs
    permissions:
      id-token: write
    needs: [ build-rs, github-release ]
    environment:
      name: crates
      url: https://crates.io/crates/gatelogue-types

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        with:
          cache: false
      - uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: auth
      - run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  publish-npm:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gatelogue-types-ts
    permissions:
      contents: read
      id-token: write
    needs: [ build-ts, github-release ]
    environment:
      name: npm
      url: https://www.npmjs.com/package/gatelogue-types

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node
        with:
          cache: false
          registry-url: https://registry.npmjs.org/

      - run: pnpm i
      - run: pnpm publish --no-git-checks

  publish-gpr:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gatelogue-types-ts
    permissions:
      contents: read
      packages: write
    needs: [ build-ts, github-release ]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node
        with:
          cache: false
          registry-url: https://npm.pkg.github.com/

      - run: |
          cat package.json | sed "s/\"name\": \"/\"name\": \"@mrt-map\//g" > package2.json
          mv package2.json package.json
      - run: pnpm i
      - run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-jsr:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gatelogue-types-ts
    permissions:
      contents: read
      id-token: write
    needs: [ build-ts, github-release ]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node
        with:
          cache: false

      - run: mv ../README.md .
      - run: pnpm i
      - run: pnpx jsr publish --allow-dirty

