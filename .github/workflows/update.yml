on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths: [ "gatelogue-aggregator/**", "gatelogue-types-py/**", ".github/workflows/update.yml" ]
  schedule:
    - cron: 0 0 * * *

permissions:
  contents: write

env:
  FORCE_COLOR: "1"
  NO_PROGRESS_BAR: "1"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: dist
      - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          version: "0.10.9"
          enable-cache: true

      - run: echo "key=$(($(date +%s)/3600))" >> "$GITHUB_ENV"
      - uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: /tmp/gatelogue
          key: ${{ env.key }}-gatelogue-data
      - run: bash update.sh -ce "*"
      - run: echo "message=update @ $(date +%Y%m%dT%H:%M:%S%Z)" >> "$GITHUB_ENV"
      - uses: EndBug/add-and-commit@a94899bca583c204427a224a7af87c02f9b325d5 # v9.1.4
        with:
          default_author: github_actions
          message: ${{ env.message }}

  trigger-map:
    uses: ./.github/workflows/trigger-map.yml
    needs: update
