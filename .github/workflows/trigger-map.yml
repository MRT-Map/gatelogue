on:
  workflow_dispatch:
  workflow_call:
    inputs:
      pat:
        default: ${{ secrets.PAT }}
        type: string
  push:
    branches: [ "dist" ]

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ inputs.pat }}
          repository: mrt-map/transit-map
          event-type: update_map
