on:
  workflow_dispatch:
  push:
    branches: [ "dist" ]
  workflow_run:
    workflows: ["Update dist"]
    types: [completed]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ secrets.PAT }}
          repository: mrt-map/transit-map
          event-type: update_map
