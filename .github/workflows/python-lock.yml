
name: "Update Python Lockfiles"

on:
  schedule:
    - cron: 0 0 * * 1
  workflow_dispatch:

jobs:
  python-lock:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-python

      - run: |
          cd gatelogue-aggregator
          rm -r requirements
          hatch -vv run true
          hatch -vv run docs:true
          hatch -vv run types:true
      
      - run: |
          cd gatelogue-types-py
          rm -r requirements
          hatch -vv run true
          hatch -vv run docs:true
          hatch -vv run types:true
      
      - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: Python lock file maintenance
          branch: python-lock-file-maintenance
          title: Python lock file maintenance
