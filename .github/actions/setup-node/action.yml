name: Setup Node
description: "Set up pnpm, node and cache pnpm"

inputs:
  cache:
    description: ""
    default: "true"
  registry-url:
    description: ""
outputs:
  pnpm:
    description: setup pnpm output
    value: ${{ toJSON(steps.pnpm.outputs) }}
  node:
    description: setup node output
    value: ${{ toJSON(steps.node.outputs) }}
  cache:
    description: setup cache output
    value: ${{ toJSON(steps.cache.outputs) }}
runs:
  using: composite
  steps:
    - id: pnpm
      uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4
      with:
        version: "10.33.2"
    - id: node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: "25.8.1"
        cache: ${{ (inputs.cache && 'pnpm') || 'none' }}
        cache-dependency-path: "**/pnpm-lock.yaml"
        registry-url: ${{ inputs.registry-url }}
    - id: cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      if: inputs.cache
      with:
        path: |
          ~/.local/share/pnpm
          **/node_modules
        key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
