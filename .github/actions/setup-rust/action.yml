name: Setup Rust
description: "Set up rust nightly"

inputs:
  components:
    description: "passed to actions-rust-lang/setup-rust-toolchain"
    default: ""
  cache:
    description: ""
    default: "true"
outputs:
  rust:
    description: setup rust output
    value: ${{ toJSON(steps.rust.outputs) }}
runs:
  using: composite
  steps:
    - id: rust
      uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
      env:
        # renovate: datasource=rust-version depName=rust-nightly
        RUST_VERSION: nightly-2026-05-08
      with:
        toolchain: ${{ env.RUST_VERSION }}
        cache-workspaces: './gatelogue-types-rs -> target'
        components: ${{ inputs.components }}
        cache: ${{ inputs.cache }}
