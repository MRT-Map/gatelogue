[tools]
python = "3.14.5"
"pipx:hatch" = { version = "1.17.0", uvx_args = "--with pip" }
uv = "0.11.18"

[env]
HATCH_ENV_TYPE_VIRTUAL_UV_PATH = { tools = true, value = "{{ exec(command='find \"' ~ tools.uv.path ~ '\" -path **/uv') }}" }
PIP_UPLOADED_PRIOR_TO = "P3D"
UV_EXCLUDE_NEWER = "3 days"
UV_CUSTOM_COMPILE_COMMAND = " "

